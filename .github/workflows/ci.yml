name: RainyScore CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore RainyScore.sln

      - name: Build solution
        run: dotnet build RainyScore.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test RainyScore.sln --configuration Release --no-build