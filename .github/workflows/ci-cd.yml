name: RainyScore CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore RainyScore.sln

      - name: Build solution
        run: dotnet build RainyScore.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test RainyScore.sln --configuration Release --no-build
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rainyscore
            git pull
            docker compose up -d --build

  